<!DOCTYPE html>
<html>
<head>
    <title>Tracking Page</title>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TFBW3F74WK"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-TFBW3F74WK');

        function sendData() {
            const urlParams = new URLSearchParams(window.location.search);
            const age = urlParams.get('age');
            const gender = urlParams.get('gender');

            if (age && gender) {
                gtag('event', 'user_data', {
                    age: age,
                    gender: gender
                });
            }

            // Redirect to your Google Site
            setTimeout(() => {
                window.location.href = "https://sites.google.com/iit.ac.lk/mirrorfit/home";
            }, 1000);
        }

        window.onload = sendData;
    </script>
</head>
<body>
    <h2>Loading...</h2>
</body>
</html>
